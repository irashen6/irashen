<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irashen - QQ堂风格主页</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="title-glow">IRASHEN</h1>
            <div class="player-info">
                <div class="avatar"></div>
                <div class="stats">
                    <div class="hp-bar">
                        <div class="hp-fill"></div>
                    </div>
                    <div class="level">Lv. MAX</div>
                </div>
            </div>
        </div>

        <div class="game-canvas">
            <div class="grid">
                <div class="wall"></div>
                <div class="wall"></div>
                <div class="wall"></div>
                <div class="wall"></div>
                <div class="wall"></div>
                <div class="wall"></div>
                <div class="wall"></div>
                <div class="wall"></div>
                <div class="wall"></div>
                <div class="wall"></div>
                <div class="wall"></div>
                <div class="wall"></div>
            </div>

            <div class="character player" id="player">
                <div class="character-body"></div>
                <div class="bubble"></div>
            </div>

            <div class="items">
                <div class="item powerup" data-type="speed"></div>
                <div class="item powerup" data-type="bomb"></div>
                <div class="item powerup" data-type="range"></div>
            </div>

            <div class="about-section">
                <div class="card">
                    <h2 class="card-title">🎮 关于我</h2>
                    <p class="card-content">沈宗颐 | 热爱编程和AI开发的工程师</p>
                    <p class="card-content">📧 shenzy97zxfdd@gmail.com | 📱 +86 151 6169 3280</p>
                </div>
                <div class="card">
                    <h2 class="card-title">🚀 技术栈</h2>
                    <div class="tech-tags">
                        <span class="tech-tag">AI Agent</span>
                        <span class="tech-tag">RAG</span>
                        <span class="tech-tag">MCP/A2A</span>
                        <span class="tech-tag">LLM微调</span>
                        <span class="tech-tag">Go</span>
                        <span class="tech-tag">Python</span>
                        <span class="tech-tag">分布式系统</span>
                    </div>
                </div>
                <div class="card">
                    <h2 class="card-title">💼 工作经历</h2>
                    <div class="work-item">
                        <strong>字节跳动</strong> 质量架构工程师 (2025.5-至今)
                    </div>
                    <div class="work-item">
                        <strong>微软(中国)</strong> 软件工程师 (2022.6-2025.5)
                    </div>
                    <div class="work-item">
                        <strong>腾讯音乐</strong> 测试开发工程师 (2021.1-2022.6)
                    </div>
                </div>
                <div class="card">
                    <h2 class="card-title">🏆 荣誉</h2>
                    <p class="card-content">微软最受欢迎讲师 (2024)</p>
                    <p class="card-content">字节Creator Plus团队启发奖 (2026)</p>
                </div>
                <div class="card">
                    <h2 class="card-title">📸 生活</h2>
                    <img src="./images/飞书文档 - 图片.jpeg" alt="Photo 1" class="profile-img">
                    <img src="./images/飞书文档 - 图片 (1).jpeg" alt="Photo 2" class="profile-img">
                </div>
            </div>
        </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
